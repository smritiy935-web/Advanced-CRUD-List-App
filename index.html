<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Simple CRUD Application</h2>

        <!-- Input Form for Creating/Updating Items -->
        <div class="form-container">
            <input type="text" id="itemInput" placeholder="Enter item name">
            <button class="add-btn" onclick="addItem()">Add Item</button>
            <button id="updateButton" class="update-btn" onclick="updateItem()" style="display:none;">Update
                Item</button>
        </div>

        <!-- List of Items -->
        <ul id="itemList" class="item-list"></ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
